name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        # We only want to log in if it's a push, PRs from forks would fail here because they don't have access to secrets
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/expression-prediction-api
          tags: |
            # Set the tag to 'latest' on the default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Also attach the git SHA to the image tag for precise versioning
            type=sha
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Only push the image to Docker Hub if this is NOT a pull request
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local Machine
    needs: build-and-push
    runs-on: self-hosted
    # Only run deployment on pushes, not PRs
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/expression-prediction-api:latest
        
      - name: Stop existing container
        run: docker stop expression-prediction-api || true
        continue-on-error: true
      - 
        name: Remove existing container
        run: docker rm expression-prediction-api || true
        continue-on-error: true
      - 
        name: Run new container
        run: docker run -d --name expression-prediction-api -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/expression-prediction-api:latest
        
